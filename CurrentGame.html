<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last 10 days</title>
    
    <style>
        p {
            font-size:15px;
            text-align:center;
        }
      
    </style>
</head>
<body>
<div id = "thing"></div>
	
    <script type = "module">
    async function UpdateGame(div) {
      let data = await fetch("https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=136");
      data = await data.json();
	  const gamesLen = data.dates[0].games.length;
      const gamePk = data.dates[0].games[gamesLen-1].gamePk;
	  let gameData = await fetch("https://statsapi.mlb.com/api/v1/game/"+gamePk+"/content");
	
	 
	  gameData = await gameData.json();
	  for(let i = 0; i<gameData.highlights.highlights.items.length; i++) {
		  const currentHighlight = gameData.highlights.highlights.items[i];
		  let p = document.createElement('a');
		  const playbacklink = currentHighlight.playbacks[0].url;
		  
		  p.innerHTML = '<a href = ' + playbacklink + '>' + currentHighlight.blurb + '</a>';
		  
		 
		  div.appendChild(p);
	  }
	  console.log(gameData);
    }

	UpdateGame(document.getElementById("thing"));

 
        
    </script>
</body>
</html>
